name: Remove LeetHub Junk
on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  remove-topics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete Topics Section
        run: |
          # This deletes any line containing "LeetCode Topics"
          sed -i '/LeetCode Topics/d' README.md
          
      - name: Commit & Push
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add README.md
          # This line prevents the bot from failing if there's nothing to clean
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-clean README" && git push)
